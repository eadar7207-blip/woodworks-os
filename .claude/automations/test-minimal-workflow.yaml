id: test_minimal
name: "Minimal Test - Research + Proposal"
description: "Simplest possible test: research prospect → generate proposal (2 steps, both work)"
version: 1.0

steps:
  - name: research_prospect
    action: skill
    config:
      skill: prospect
      params:
        action: research
        name: "{{lead_name}}"
        company: "{{lead_company}}"

  - name: generate_proposal
    action: skill
    config:
      skill: proposal
      params:
        action: generate
        prospect_name: "{{lead_name}}"
        company: "{{lead_company}}"
        scope: "Real estate lead automation system"
